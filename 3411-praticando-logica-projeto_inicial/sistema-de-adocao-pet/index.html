<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Probabilidade de Adoção</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Calcular Probabilidade de Adoção</h1>

        <div class="campo">
            <label for="peso">Peso do animal (kg):</label>
            <input type="number" id="peso" placeholder="Digite o peso">
        </div>

        <div class="campo">
            <label for="idade">Idade do animal (anos):</label>
            <input type="number" id="idade" placeholder="Digite a idade">
        </div>

        <button onclick="mostrarResultado()">Calcular</button>

        <h2 id="resultado"></h2>
    </div>
<script src="app.js"></script>

</body>
</html>
